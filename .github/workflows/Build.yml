name: Android Spatial Player Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true

      # Automatic License Acceptance (Sabse zaruri step)
      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # Specific NDK version install karna jo aapne gradle.properties mein di hai
      - name: Install NDK 25.2.9519653
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      # FIX: Execute permission for gradlew script
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build Command with Memory Optimization
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx3072m"

      # Generate Artifact (Downloadable APK)
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Spatial-Player-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
